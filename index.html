<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ece Yılmaz — Portfolyo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#111111;
    --ink-soft:#6E6E6E;
    --line:#E3E3E3;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } *{ animation:none !important; transition:none !important; } }

  body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }
  :focus-visible{ outline:2px solid var(--ink); outline-offset:3px; }

  .eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }
  .num{ font-family:'IBM Plex Mono',monospace; font-size:.8rem; color:var(--ink-soft); }
  h1,h2,h3{ font-family:'Archivo',sans-serif; font-weight:900; letter-spacing:-0.02em; text-transform:uppercase; }

  header{ position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(255,255,255,.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); }
  .nav-inner{ max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:20px 32px; }
  .logo{ font-family:'Archivo',sans-serif; font-weight:900; font-size:1.05rem; letter-spacing:.02em; }
  nav ul{ list-style:none; display:flex; gap:32px; }
  nav a{ font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--ink-soft); display:flex; gap:8px; align-items:baseline; border-bottom:1px solid transparent; padding-bottom:3px; transition:color .15s,border-color .15s; }
  nav a b{ color:var(--ink); font-weight:500; }
  nav a:hover, nav a.active{ color:var(--ink); border-color:var(--ink); }
  .nav-toggle{ display:none; background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--ink); }

  @media (max-width:780px){
    nav ul{ position:absolute; top:100%; left:0; right:0; flex-direction:column; gap:0; background:var(--bg); border-bottom:1px solid var(--line); max-height:0; overflow:hidden; }
    nav ul.open{ max-height:400px; }
    nav a{ display:flex; padding:16px 32px; border-bottom:1px solid var(--line); }
    .nav-toggle{ display:block; }
  }

  main{ padding-top:64px; }
  section.page{ display:none; min-height:70vh; }
  section.page.active{ display:block; }
  .wrap{ max-width:1200px; margin:0 auto; padding:0 32px; }

  .marquee{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); overflow:hidden; white-space:nowrap; padding:14px 0; margin-top:40px; }
  .marquee-track{ display:inline-block; animation:scroll-left 22s linear infinite; }
  .marquee-track span{ font-family:'IBM Plex Mono',monospace; font-size:.82rem; letter-spacing:.05em; text-transform:uppercase; margin-right:40px; color:var(--ink-soft); }
  @keyframes scroll-left{ 0%{ transform:translateX(0); } 100%{ transform:translateX(-50%); } }

  .hero{ padding:100px 0 0; }
  .hero h1{ font-size:clamp(2.6rem,7vw,6rem); line-height:.98; }
  .hero-sub{ display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap; padding:26px 0 40px; border-bottom:1px solid var(--line); }
  .hero-sub p{ max-width:44ch; color:var(--ink-soft); font-size:.98rem; }

  .btn{ display:inline-block; border:1px solid var(--ink); color:var(--ink); padding:13px 26px; font-family:'IBM Plex Mono',monospace; font-size:.82rem; text-transform:uppercase; letter-spacing:.05em; transition:background .15s,color .15s; }
  .btn:hover{ background:var(--ink); color:var(--bg); }

  .grid{ display:grid; gap:1px; background:var(--line); }
  .featured-grid{ grid-template-columns:repeat(4,1fr); margin-top:1px; }
  @media (max-width:900px){ .featured-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:520px){ .featured-grid{ grid-template-columns:1fr; } }

  .tile{ aspect-ratio:4/5; background:var(--bg); position:relative; display:flex; align-items:flex-end; padding:16px; transition:background .15s; }
  .tile:hover{ background:#F5F5F5; }
  .tile span{ font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--ink-soft); }

  .about-top{ padding:100px 0 40px; display:grid; grid-template-columns:280px 1fr; gap:60px; align-items:start; border-bottom:1px solid var(--line); }
  @media (max-width:780px){ .about-top{ grid-template-columns:1fr; } }
  .portrait{ aspect-ratio:3/4; background:#F2F2F2; display:flex; align-items:center; justify-content:center; }
  .portrait span{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:var(--ink-soft); }
  .about-top h1{ font-size:clamp(2rem,4vw,2.6rem); margin:8px 0 20px; }
  .about-top p{ color:var(--ink-soft); max-width:56ch; margin-bottom:14px; font-size:.98rem; }

  .awards{ padding:50px 0 100px; }
  .awards h2{ font-size:1.2rem; margin-bottom:26px; }
  .award-row{ display:flex; gap:28px; padding:20px 0; border-bottom:1px solid var(--line); align-items:baseline; }
  .award-row .yr{ font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); font-size:.82rem; width:52px; flex-shrink:0; }
  .award-row .txt strong{ font-weight:600; font-family:'Inter',sans-serif; text-transform:none; }
  .award-row .txt p{ color:var(--ink-soft); font-size:.9rem; margin-top:4px; }

  .cat-hero{ padding:100px 0 0; border-bottom:1px solid var(--line); padding-bottom:40px; }
  .cat-hero .num{ display:block; margin-bottom:10px; }
  .cat-hero h1{ font-size:clamp(2.2rem,5vw,3.4rem); margin-bottom:14px; }
  .cat-hero p{ color:var(--ink-soft); max-width:58ch; font-size:.98rem; }

  .brand-block{ padding:70px 0; border-bottom:1px solid var(--line); scroll-margin-top:80px; display:grid; grid-template-columns:.9fr 1.1fr; gap:50px; align-items:center; }
  .brand-block:nth-child(even){ direction:rtl; }
  .brand-block:nth-child(even) > *{ direction:ltr; }
  @media (max-width:820px){ .brand-block{ grid-template-columns:1fr; } .brand-block:nth-child(even){ direction:ltr; } }

  .brand-media{ aspect-ratio:4/3; background:#F2F2F2; display:flex; align-items:center; justify-content:center; }
  .brand-media span{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:var(--ink-soft); }
  .brand-index{ font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--ink-soft); margin-bottom:14px; display:block; }
  .brand-block h3{ font-size:2rem; margin-bottom:16px; }
  .brand-block p{ color:var(--ink-soft); max-width:46ch; font-size:.95rem; margin-bottom:20px; }
  .tag-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .tag{ font-family:'IBM Plex Mono',monospace; font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; border:1px solid var(--line); padding:5px 12px; color:var(--ink-soft); }

  footer{ padding:50px 32px 80px; text-align:center; color:var(--ink-soft); font-size:.85rem; border-top:1px solid var(--line); }
  footer a{ text-decoration:underline; text-underline-offset:3px; }
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="#home" class="logo">ECE YILMAZ</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menüyü aç">☰</button>
    <nav><ul id="navList">
      <li><a href="#home" data-page="home">01 <b>Ana Sayfa</b></a></li>
      <li><a href="#about" data-page="about">02 <b>Hakkımda</b></a></li>
      <li><a href="#social-media" data-page="social-media">03 <b>Social Media</b></a></li>
      <li><a href="#branding" data-page="branding">04 <b>Branding</b></a></li>
      <li><a href="#advertising" data-page="advertising">05 <b>Advertising</b></a></li>
    </ul></nav>
  </div>
</header>

<main>

  <section class="page" id="home">
    <div class="wrap hero">
      <h1>Ece<br>Yılmaz</h1>
      <div class="hero-sub">
        <p>Görsel tasarımcı — sosyal medya, marka kimliği ve reklam alanlarında sade, amacına hizmet eden işler üretiyorum.</p>
